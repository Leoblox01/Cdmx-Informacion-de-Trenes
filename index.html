<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚇</text></svg>">
    <title>Informacion Trenes CDMX</title>
    <style>
        body { background: #0A0A0A; color: #FF7F00; font-family: 'Courier New', monospace; display: flex; flex-direction: column; margin: 0; min-height: 100vh; overflow-x: hidden; }
        #carga { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s ease; }
        #carga img { width: 80%; max-width: 800px; border: 2px solid #FF7F00; box-shadow: 0 0 20px #FF7F00; }
        .loading-text { margin-top: 20px; font-weight: bold; letter-spacing: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        #contenedor-principal { display: flex; flex: 1; height: 100vh; }
        #panel-izq { width: 300px; background: #000; border-right: 2px solid #FF7F00; padding: 20px; overflow-y: auto; }
        #panel-der { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; overflow-y: auto;}
        h2 { border-bottom: 2px solid #FF7F00; padding-bottom: 10px; text-transform: uppercase; margin-top: 0;}
        button { display: block; width: 100%; margin: 8px 0; background: transparent; border: 1px solid #FF7F00; color: #FF7F00; cursor: pointer; padding: 10px; font-weight: bold; text-transform: uppercase; font-family: 'Courier New', monospace;}
        button:hover { background: #FF7F00; color: #000; box-shadow: 0 0 10px #FF7F00; }
        #info-contenedor { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 700px; }
        #titulo { margin-bottom: 10px; font-size: 2em;}
        #datos { font-size: 1.1em; line-height: 1.4; text-align: justify; margin-top: 15px; }
        #imagen-dinamica { max-width: 100%; max-height: 400px; border: 2px solid #FF7F00; box-shadow: 0 0 15px #FF7F00; margin-top: 20px; display: none; object-fit: contain; }
    </style>
</head>
<body>

<div id="carga">
    <img src="./NM22.webp" alt="CARGANDO">
    <div class="loading-text">CARGANDO...</div>
</div>

<div id="contenedor-principal">
    <div id="panel-izq">
        <h2>CONTROL CENTRAL</h2>
        <button onclick="ver('MP-68')">MP-68</button>
        <button onclick="ver('NM-73')">NM-73</button>
        <button onclick="ver('NM-79')">NM-79</button>
        <button onclick="ver('MP-82')">MP-82</button>
        <button onclick="ver('NC-82')">NC-82</button>
        <button onclick="ver('NM-83')">NM-83</button>
        <button onclick="ver('FM-86')">FM-86</button>
        <button onclick="ver('NE-92')">NE-92</button>
        <button onclick="ver('FM-95A')">FM-95A</button>
        <button onclick="ver('NM-02')">NM-02</button>
        <button onclick="ver('FE-07')">FE-07</button>
        <button onclick="ver('FE-10')">FE-10</button>
        <button onclick="ver('NM-16')">NM-16</button>
        <button onclick="ver('NM-22 / NCH-22')">NM-22 / NCH-22</button>
    </div>

    <div id="panel-der">
        <div id="info-contenedor">
            <h1 id="titulo">SISTEMA INICIALIZADO</h1>
            <img id="imagen-dinamica" src="" alt="CARGANDO">
            <p id="datos">Selecciona un modelo del panel izquierdo para desplegar especificaciones técnicas.</p>
        </div>
        
        <section id="contacto" style="margin-top: 50px;">
            <h2>Redes del dueño</h2>
            <ul class="redes-lista" style="list-style: none; padding: 0;">
                <li><a href="https://www.youtube.com/@Leoblox01" target="_blank" style="display: inline-block; padding: 10px 20px; margin: 5px; background-color: #333; color: white; text-decoration: none; border-radius: 5px;">YouTube</a></li>
                <li><a href="https://www.twitch.tv/leo_blox01" target="_blank" style="display: inline-block; padding: 10px 20px; margin: 5px; background-color: #333; color: white; text-decoration: none; border-radius: 5px;">Twitch/X</a></li>
            </ul>
        </section>
    </div>
</div>

<script>
    // Pantalla de carga
    setTimeout(() => { 
        document.getElementById('carga').style.opacity = '0'; 
        setTimeout(() => document.getElementById('carga').style.display = 'none', 1000); 
    }, 3000);

    const db_texto = {
        "MP-68": "MP-68: Su nombre completo es Materiel Roulant Sur Pneumatiques 1968, fue hecho por la empresa Alstom, de origen francés, este fue el tren que inauguró el metro con la Línea 1, rehabilitado entre 1993 a 1996 por bombardier y caf.",
        "NM-73": "NM-73: Neumático Mexicano del 1973, fue el 2do tren de catálogo del metro, rehabilitado en 2004, se les puso traccion IGBT en el año 2014.",
        "NM-79": "NM-79: Este fue el 3er modelo del metro de la CDMX, tuvo trenes recuperados gracias a Ricardo Ortega, se les añadio el vinil *mandarino*.",
        "MP-82": "MP-82: Llamado MP-82 (Materiel Sur Pneumatique 1982), este tren contó con un sistema de tracción Chopper, sonaba parecido a las notas musicales Fa,Si,Fa.",
        "NC-82": "NC-82: Tren adquirido desde Canadá a la empresa Bombardier, se le conoce como 'El borracho' por sus timbres de puertas distorsionado.",
        "NM-83": "NM-83: Neumático Mexicano 1983, Un tren ordinario de la ciudad de mexico que circula en lineas 8 y 7.",
        "FM-86": "FM-86: Férreo Mexicano 1986, fabricado para la Línea A, introdujo la rodadura férrea en la linea A.",
        "NE-92": "NE-92: Neumático Español 1992, fabricado por CAF, integro una nueva cabina conocida como la cabina cab, base para los mp68r96c.",
        "FM-95A": "FM-95A: Tren de la línea A, conocido por ser extinto debido a sus fallas informáticas, falta de refacciones, etc, el primer tren en emplear vvvf.",
        "NM-02": "NM-02: Hecho para la modernización de la Línea 2, tiene un sistema de tracción VVVF, siendo el 2do en emplearlo.",
        "FE-07": "FE-07: Férreo Español 2007, construido por CAF, diseñado para operar con rodadura férrea en la linea A por su escazes de trenes.",
        "FE-10": "FE-10: Ferreo Español 2010, modelo insignia de la Línea 12 con bogies que no son aptos para la linea, por lo que causa fallas en la linea y se cayo en tezonco-olivos.",
        "NM-16": "La ultima adquisicion a CAF por fallas, este tren fue el originalmente planeado para la modernizacion de la linea 1, de 45 trenes solo alcanzo para 10",
        "NM-22 / NCH-22": "El tren mas moderno del metro de la ciudad de mexico, elaborado por CRRC ZhuZhou Locomotive, para la modernizacion de la linea 1, actualmente esta en servicio, con su pilotaje nuevo CBTC mediante Wi-Fi."
    };

    const db_imagenes = {
        "MP-68": "./MP68.webp",
        "NM-73": "./NM73.webp",
        "NM-79": "./NM79.webp",
        "MP-82": "./MP82.webp",
        "NC-82": "./NC82.webp",
        "NM-83": "./NM83.webp",
        "FM-86": "./FM86.webp",
        "NE-92": "./NE92.webp",
        "FM-95A": "./FM95A.webp",
        "NM-02": "./NM02.webp",
        "FE-07": "./FE07.webp",
        "FE-10": "./FE10.webp",
        "NM-16": "./NM16.webp",
        "NM-22 / NCH-22": "./NM22.webp"
    };

    function ver(modelo) {
        document.getElementById('titulo').innerText = modelo;
        document.getElementById('datos').innerText = db_texto[modelo];
        const imgElement = document.getElementById('imagen-dinamica');
        if (db_imagenes[modelo]) {
            imgElement.src = db_imagenes[modelo];
            imgElement.style.display = 'block';
        } else {
            imgElement.style.display = 'none';
        }
    }
</script>

</body>
</html>
